<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calendar 2026</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .calendar-table th, .calendar-table td {
      text-align: center;
      width: 14.28%;
      height: 40px;
    }
    .month-title {
      text-align: center;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body class="container my-4">

<h2 class="text-center mb-4">Calendar 2026</h2>

<div class="row" id="calendar"></div>

<script>
const months = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function generateCalendar(year) {
  const container = document.getElementById("calendar");

  months.forEach((month, index) => {
    const firstDay = new Date(year, index, 1).getDay();
    const totalDays = new Date(year, index + 1, 0).getDate();

    let col = document.createElement("div");
    col.className = "col-md-4 col-lg-3";

    let title = `<div class="month-title">${month}</div>`;

    let table = `<table class="table table-bordered calendar-table">
      <thead><tr>${days.map(d => `<th>${d}</th>`).join("")}</tr></thead>
      <tbody><tr>`;

    let dayCount = 0;

    // Empty cells before first day
    for (let i = 0; i < firstDay; i++) {
      table += "<td></td>";
      dayCount++;
    }

    // Fill days
    for (let d = 1; d <= totalDays; d++) {
      if (dayCount === 7) {
        table += "</tr><tr>";
        dayCount = 0;
      }
      table += `<td>${d}</td>`;
      dayCount++;
    }

    // Fill remaining cells
    while (dayCount < 7) {
      table += "<td></td>";
      dayCount++;
    }

    table += "</tr></tbody></table>";

    col.innerHTML = title + table;
    container.appendChild(col);
  });
}

generateCalendar(2026);
</script>

</body>
</html>
